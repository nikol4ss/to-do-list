name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Backend Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      PYTEST_USE_POSTGRES: "True"
      EMAIL_HOST_USER: test@example.com
      EMAIL_HOST_PASSWORD: test-password
      DEFAULT_FROM_EMAIL: test@example.com
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for postgres..."; sleep 2
          done

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=users \
            --cov=tasks \
            --cov=categories \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-e2e:
    name: Frontend Selenium
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      EMAIL_HOST_USER: test@example.com
      EMAIL_HOST_PASSWORD: test-password
      DEFAULT_FROM_EMAIL: test@example.com
      FRONTEND_URL: http://127.0.0.1:3000
      VITE_API_URL: http://127.0.0.1:8000/api
      E2E_FRONTEND_URL: http://127.0.0.1:3000
      E2E_API_URL: http://127.0.0.1:8000/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            e2e/requirements.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install backend and E2E dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r e2e/requirements.txt

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo "Waiting for postgres..."; sleep 2
          done

      - name: Run backend migrations
        run: python manage.py migrate --no-input
        working-directory: backend

      - name: Start backend
        run: nohup python manage.py runserver 0.0.0.0:8000 >/tmp/backend.log 2>&1 &
        working-directory: backend

      - name: Start frontend
        run: nohup pnpm dev --host 0.0.0.0 --port 3000 >/tmp/frontend.log 2>&1 &
        working-directory: frontend

      - name: Wait for application
        run: |
          until (echo > /dev/tcp/127.0.0.1/8000) >/dev/null 2>&1 && (echo > /dev/tcp/127.0.0.1/3000) >/dev/null 2>&1
          do
            echo "Waiting for app..."; sleep 2
          done
          until curl -fsS http://127.0.0.1:3000 >/dev/null; do
            echo "Waiting for frontend..."; sleep 2
          done

      - name: Run Selenium tests
        run: python -m pytest e2e/selenium -v

      - name: Upload app logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
